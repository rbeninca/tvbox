##################################################
# AMLOGIC S9XX - CLEAN LINUX CONFIGURATION
##################################################

# Caminho correto do Linux (Armbian)
firmware_path = /lib/firmware/

# MAC Address (1 = Gerar um MAC aleatório na memória, sem gravar em disco)
ignore_efuse_mac = 0
mac_address_mode = 1

# Hardware (Mudando de LDO para DCDC para evitar o apagão da Amlogic)
xtal_clock = 24
volt_regulator = 1

# Desligar recursos problemáticos para estabilizar o barramento SDIO
hw_cap_gf = off
hw_cap_2ghz = on
hw_cap_5ghz = off
hw_cap_security = on
hw_cap_sgi_20 = on
hw_cap_sgi_40 = off
hw_cap_ap = on
hw_cap_p2p = off
#use_wpa2_only = 1

# Forçando energia baixa para evitar Brownout (Erro -84)
hw_cap_ht = off
hw_cap_ampdu_rx = off
hw_cap_ampdu_tx = off
wifi_tx_gain_level_b = 14
wifi_tx_gain_level_gn = 14
