# =============================================================================
# ir_daemon.conf — Configuração do daemon IR TX9
# Controle remoto original do TX9 Pro (protocolo NEC extended, custom 0x4040)
#
# Hot-reload: sudo systemctl kill -s HUP tx9-ir.service
#             (ou: sudo kill -HUP <PID>)
#
# Para aprender novos botões, execute:
#   sudo bash install_ir_service.sh listen
# =============================================================================

[device]
# Dispositivo de input IR.
# 'auto' detecta automaticamente via /sys/class/rc/
event_device = auto

# Protocolo IR do controle remoto.
# Controle TX9: necx (NEC extended, 24-bit scancodes)
# Outros valores: nec, rc-5, rc-6, jvc, sony, sanyo
# Para múltiplos: nec,rc-5,rc-6
protocol = necx


[filter]
# Código customizado do fabricante (bits 23:8 do scancode NEC extended).
# Filtra eventos: aceita apenas scancodes onde (scancode >> 8) == prefix.
# Isso garante que apenas o controle TX9 seja processado, ignorando outros
# controles que porventura estejam no ambiente.
#
# TX9 remote custom code: 0x4040
# Para aceitar qualquer controle (sem filtro), comente ou deixe vazio:
prefix = 0x4040


[settings]
# Tempo máximo (segundos) entre dois eventos do MESMO código para ser
# considerado "repeat/hold" do protocolo NEC (repeats a cada ~110ms).
# Aumente se tiver falsos positivos; diminua se double-press não funcionar.
repeat_threshold = 0.22

# Tempo de hold (segundos) antes de começar a disparar ações em repetição.
# Exemplo: segurar Volume+ por 0.5s começa a repetir.
repeat_delay = 0.50

# Intervalo mínimo (segundos) entre disparos durante hold.
repeat_rate = 0.20

# Timeout (segundos) para completar uma sequência de teclas.
# Se o segundo botão não vier nesse tempo, a sequência é descartada.
sequence_timeout = 1.50


[keys]
# Mapeamento de scancodes para comandos shell.
# Formato: scancode = comando
# Scancode em hex (0x...) ou decimal.
# Deixe o valor vazio para registrar o botão no log sem executar ação.
#
# Teclas capturadas do controle TX9:
#
# ── Controles de energia ──────────────────────────────────────────────────────
0x40404d = systemctl poweroff

# ── Áudio ─────────────────────────────────────────────────────────────────────
0x404043 = amixer -q set Master toggle
0x404018 = amixer -q set Master 5%+
0x404017 = amixer -q set Master 5%-

# ── Navegação ─────────────────────────────────────────────────────────────────
# Descomente e configure conforme sua aplicação.
# Podem enviar eventos de teclado via uinput, controlar kodi, mpv, etc.
#
# 0x40400b =   # UP
# 0x40400e =   # DOWN
# 0x404011 =   # RIGHT
# 0x404010 =   # LEFT
# 0x40400d =   # OK / Enter

# ── Funções ───────────────────────────────────────────────────────────────────
# 0x40401a =   # Home
# 0x404042 =   # Voltar (Back)
# 0x404045 =   # Menu (três barras)
# 0x404047 =   # Cursor (ativar/desativar cursor do mouse)


[sequences]
# Mapeamento de sequências de teclas para comandos shell.
# Formato: scancode1,scancode2,... = comando
# As teclas devem ser pressionadas dentro de sequence_timeout segundos.
#
# Exemplos (descomente para usar):
#
# Pressionar OK duas vezes reinicia o servidor de display
# 0x40400d,0x40400d = systemctl restart tx9-display.service
#
# Pressionar UP + DOWN mostra temperatura no display
# 0x40400b,0x40400e = tx9-show show_text "CPU " --duration 3
#
# Pressionar Voltar + Home força reboot
# 0x404042,0x40401a = systemctl reboot
#
# Pressionar Menu + OK mostra endereço IP no display
# 0x404045,0x40400d = tx9-show scroll "$(hostname -I)" --speed 0.3
